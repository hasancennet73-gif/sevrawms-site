<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Ilan Teklif Yonetimi</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--line:rgba(255,255,255,.08);--text:#eef4ff;--muted:#aebcd3;--yellow:#f1c84d;}
    body{font-family:Arial,Helvetica,sans-serif;color:var(--text);background:radial-gradient(circle at top right, rgba(241,200,77,.08), transparent 18%),radial-gradient(circle at left top, rgba(44,89,179,.16), transparent 24%),linear-gradient(180deg,#071425,#08111b 74%,#040912);}
    a{text-decoration:none;color:inherit}
    .wrap{max-width:1200px;margin:0 auto;padding:26px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .title h1{font-size:36px;margin-bottom:8px}
    .title p{color:var(--muted)}
    .btn{min-height:42px;padding:0 14px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;text-decoration:none}
    .btn.primary{background:var(--yellow);color:#0b1830;border-color:transparent}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(241,200,77,.14);color:#ffe08a;font-size:12px;font-weight:700}
    .card,.panel,.note{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.03);padding:18px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    .card strong{display:block;font-size:28px;margin-bottom:6px}
    .card span{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    label{font-size:13px;color:#dce6f5;font-weight:700}
    input,select,textarea{width:100%;background:#091425;border:1px solid rgba(255,255,255,.10);color:#fff;border-radius:12px;padding:12px;font-size:15px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
    .status{display:inline-flex;min-height:28px;padding:0 10px;border-radius:999px;align-items:center;font-size:12px;font-weight:700;background:rgba(241,200,77,.14);color:#ffe08a}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    @media (max-width:900px){.grid,.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <div class="title"><h1>Ilan & Teklif Yonetimi</h1><p>Teklifleri yonet ve admin notu yaz.</p></div>
    <div class="actions">
      <div id="badge" class="badge">Admin</div>
      <a class="btn" href="panel.html">Panele Don</a>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="grid">
    <div class="panel">
      <h2>Ilanlar</h2>
      <table><thead><tr><th>Baslik</th><th>Sahip</th><th>Guzergah</th><th>Durum</th><th>Islem</th></tr></thead><tbody id="loadRows"></tbody></table>
    </div>
    <div class="panel">
      <h2>Teklifler</h2>
      <table><thead><tr><th>Ilan</th><th>Uye</th><th>Fiyat</th><th>Durum</th><th>Islem</th></tr></thead><tbody id="offerRows"></tbody></table>
      <div class="field" style="margin-top:14px">
        <label>Secili Teklif Admin Notu</label>
        <textarea id="adminNote"></textarea>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="notKaydet()">Not Kaydet</button>
      </div>
    </div>
  </div>
</div>

<script src="kimlik-dogrulama.js"></script>

<script>
var activeOfferId='';
if(SEVRA_KIMLIK.requireAdmin()){
  document.getElementById('badge').textContent='Admin: '+SEVRA_KIMLIK.getAuth().username;
}
function loadAdmin(){
  var loads=SEVRA_KIMLIK.getLoads(), offers=SEVRA_KIMLIK.getOffers();
  document.getElementById('cards').innerHTML=
    '<div class="card"><strong>'+loads.length+'</strong><span>Ilan</span></div>'+
    '<div class="card"><strong>'+offers.length+'</strong><span>Teklif</span></div>'+
    '<div class="card"><strong>'+offers.filter(x=>x.status==='Bekliyor').length+'</strong><span>Bekliyor</span></div>'+
    '<div class="card"><strong>'+offers.filter(x=>(x.adminNote||'').trim()).length+'</strong><span>Notlu</span></div>';

  document.getElementById('loadRows').innerHTML=!loads.length?'<tr><td colspan="5">Ilan yok.</td></tr>':
    loads.map(function(x){
      return '<tr><td>'+x.title+'</td><td>'+x.owner+'</td><td>'+x.route+'</td><td><span class="status">'+x.status+'</span></td><td><button class="btn" onclick="ilanDurum('+x.id+',\'Açık\')">Ac</button> <button class="btn primary" onclick="ilanDurum('+x.id+',\'Kapalı\')">Kapat</button></td></tr>';
    }).join('');

  document.getElementById('offerRows').innerHTML=!offers.length?'<tr><td colspan="5">Teklif yok.</td></tr>':
    offers.map(function(x){
      var load=loads.find(l=>String(l.id)===String(x.loadId));
      return '<tr><td>'+(load?load.title:'-')+'</td><td>'+(x.memberName||x.member)+'</td><td>'+x.price+'</td><td><span class="status">'+x.status+'</span><br>'+(x.adminNote||'')+'</td><td><button class="btn" onclick="sec('+x.id+')">Sec</button> <button class="btn primary" onclick="teklifDurum('+x.id+',\'Onaylandı\')">Onayla</button> <button class="btn" onclick="teklifDurum('+x.id+',\'Reddedildi\')">Reddet</button></td></tr>';
    }).join('');
}
function sec(id){
  activeOfferId=String(id);
  var row=SEVRA_KIMLIK.getOffers().find(x=>String(x.id)===String(id));
  document.getElementById('adminNote').value=row?(row.adminNote||''):'';
}
function notKaydet(){
  if(!activeOfferId){alert('Once teklif sec.');return;}
  try{SEVRA_KIMLIK.setOfferAdminNote(activeOfferId,document.getElementById('adminNote').value);loadAdmin();alert('Not kaydedildi.');}catch(err){alert(err.message);}
}
function teklifDurum(id,s){try{SEVRA_KIMLIK.setOfferStatus(id,s);loadAdmin();}catch(err){alert(err.message);}}
function ilanDurum(id,s){try{SEVRA_KIMLIK.setLoadStatus(id,s);loadAdmin();}catch(err){alert(err.message);}}
loadAdmin();
</script>

</body>
</html>
