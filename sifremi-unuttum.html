<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Şifremi Unuttum</title>
  <link rel="stylesheet" href="uye-auth.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Şifre Yenileme</span>
        </div>
      </a>
      <div class="actions">
        <a class="btn" href="uye-login.html">Üye Girişi</a>
        <a class="btn" href="index.html">Ana Sayfa</a>
      </div>
    </header>

    <main class="stack">
      <section class="panel">
        <div class="kicker">Şifre Yenileme</div>
        <h1>Şifrenizi yenileyin</h1>
        <p>Kayıtlı e-posta adresinizi girin. Şifre yenileme bağlantısı e-posta adresinize gönderilir.</p>

        <form id="forgotForm" class="form-grid" autocomplete="off">
          <div class="field full">
            <label for="email">E-Posta</label>
            <input id="email" name="email" type="email" placeholder="ornek@firma.com" autocomplete="email" autocapitalize="none" spellcheck="false" />
          </div>
          <div class="actions-row full">
            <button id="forgotBtn" type="submit" class="btn primary">Yenileme Bağlantısı Gönder</button>
            <a class="btn" href="uye-login.html">Girişe Dön</a>
          </div>
        </form>

        <div id="forgotMsg" class="note hidden"></div>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://yyiphivbdsjsuxyaihnf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SCFO1g9veclYKqCI3pw7Eg_dE1bhyLR';

    function show(el, text, ok) {
      el.className = 'note ' + (ok ? 'ok' : 'err');
      el.textContent = text;
    }

    function setBusy(isBusy) {
      const btn = document.getElementById('forgotBtn');
      btn.disabled = isBusy;
      btn.textContent = isBusy ? 'Gönderiliyor...' : 'Yenileme Bağlantısı Gönder';
    }

    function createToken() {
      return 'RESET-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
    }

    async function supabaseSelectMemberByEmail(email) {
      const url =
        SUPABASE_URL +
        '/rest/v1/members?email=eq.' +
        encodeURIComponent(email) +
        '&select=id,email,status';

      const response = await fetch(url, {
        method: 'GET',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json'
        }
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error('Üye kontrolü başarısız: ' + text);
      }

      const data = await response.json();
      return Array.isArray(data) ? data[0] : null;
    }

    async function supabaseInsertPasswordReset(email, token) {
      const url = SUPABASE_URL + '/rest/v1/password_resets';

      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify([
          {
            email: email,
            token: token,
            used: false
          }
        ])
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error('Reset kaydı oluşturulamadı: ' + text);
      }

      return await response.json();
    }

    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const msg = document.getElementById('forgotMsg');

      if (!email) {
        show(msg, 'Lütfen e-posta adresinizi girin.', false);
        return;
      }

      setBusy(true);

      try {
        const member = await supabaseSelectMemberByEmail(email);

        if (!member) {
          show(msg, 'Bu e-posta ile kayıt bulunamadı.', false);
          setBusy(false);
          return;
        }

        if (member.status && member.status !== 'Aktif') {
          show(msg, 'Bu hesap aktif değil.', false);
          setBusy(false);
          return;
        }

        const token = createToken();
        await supabaseInsertPasswordReset(email, token);

        const resetLink =
          window.location.origin +
          '/sifre-sifirla.html?token=' +
          encodeURIComponent(token);

        sessionStorage.setItem('sevra_last_reset_email', email);
        sessionStorage.setItem('sevra_last_reset_link', resetLink);

        const response = await fetch('/api/send-reset-mail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, resetLink })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Mail gönderilemedi.');
        }

        show(msg, 'Şifre yenileme bağlantısı gönderildi. Yönlendiriliyorsunuz.', true);

        setTimeout(function () {
          window.location.href = 'sifre-mail-bekleniyor.html';
        }, 700);
      } catch (err) {
        show(msg, 'İşlem başarısız: ' + err.message, false);
        setBusy(false);
      }
    });
  </script>
</body>
</html>
