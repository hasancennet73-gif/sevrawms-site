<script>
function createToken(){
  return 'RESET-' + Math.random().toString(36).slice(2,10) + '-' + Date.now();
}

document.getElementById('forgotForm').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();

  const token = createToken();

  fetch('/api/send-mail', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: email,
      link: 'https://sevrawms.com.tr/sifre-sifirla.html?token=' + token,
      type: 'reset'
    })
  });

  window.location.href = 'sifre-mail-bekleniyor.html';
});
</script>
