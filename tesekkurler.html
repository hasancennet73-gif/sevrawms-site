<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEVRA | Başvurunuz Alındı</title>
<style>

    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#071427;
      --bg2:#0c1f3f;
      --panel:#0f254a;
      --panel2:#132d59;
      --line:rgba(255,255,255,.10);
      --text:#eef4ff;
      --muted:#aebbd1;
      --yellow:#f3c744;
      --yellow-dark:#d7a61c;
      --shadow:0 22px 60px rgba(0,0,0,.35);
      --max:1320px;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(243,199,68,.08), transparent 18%),
        radial-gradient(circle at left top, rgba(36,78,154,.16), transparent 24%),
        linear-gradient(180deg,#071427,#08111d 70%,#050b14);
      line-height:1.6;
    }
    a{text-decoration:none;color:inherit}
    .container{max-width:var(--max);margin:0 auto;padding:0 22px}
    .topbar{
      position:sticky; top:0; z-index:100;
      background:rgba(4,12,24,.88); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      min-height:86px; display:flex; align-items:center; justify-content:space-between; gap:18px;
    }
    .brand{display:flex;align-items:center;gap:14px}
    .brand-mark{
      width:54px;height:54px;border-radius:16px;
      background:linear-gradient(135deg,var(--yellow),#f8df91);
      color:#0d1d38;font-size:24px;font-weight:800;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 12px 30px rgba(243,199,68,.28);
    }
    .brand-text strong{display:block;font-size:30px;letter-spacing:.4px}
    .brand-text span{display:block;font-size:12px;color:#d6e0ef;letter-spacing:.8px}
    .nav{display:flex;gap:28px;color:#d2dcef;font-size:15px}
    .nav a:hover{color:#fff}
    .actions{display:flex;align-items:center;gap:12px}
    .btn{
      min-height:48px;padding:0 22px;border-radius:14px;
      display:inline-flex;align-items:center;justify-content:center;
      font-weight:700;border:1px solid transparent;transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--yellow);color:#0b1830;box-shadow:0 14px 30px rgba(243,199,68,.18)}
    .btn-primary:hover{background:var(--yellow-dark)}
    .btn-secondary{background:rgba(255,255,255,.04);border-color:var(--line);color:#fff}
    .btn-secondary:hover{background:rgba(255,255,255,.08)}
    .section-head{max-width:920px;margin-bottom:26px}
    .section-head h2{font-size:42px;line-height:1.06;margin-bottom:12px}
    .section-head p{font-size:17px;color:var(--muted)}
    .card{
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      background:linear-gradient(180deg,rgba(10,23,45,.96),rgba(7,17,34,.96));
      box-shadow:var(--shadow);
    }
    footer{border-top:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.18)}
    .footer-inner{
      min-height:90px;display:flex;align-items:center;justify-content:space-between;
      gap:18px;flex-wrap:wrap;color:#b2bed2;font-size:14px
    }
    .footer-inner strong{color:#fff}
    @media (max-width:980px){
      .nav,.actions{display:none}
      .section-head h2{font-size:32px}
    }

.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{max-width:760px;width:100%;padding:42px;text-align:center}
.box h1{font-size:48px;line-height:1.05;margin-bottom:12px}
.box p{font-size:18px;color:var(--muted);margin-bottom:24px}
.actions-center{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="card box">
    <h1>Başvurunuz alındı</h1>
    <p>Teşekkür ederiz. Başvurunuz SEVRA sistemine iletildi. Değerlendirme ve dönüş süreci için sizinle iletişime geçilecektir.</p>
    <div class="actions-center">
      <a class="btn btn-primary" href="index.html">Ana Sayfaya Dön</a>
      <a class="btn btn-secondary" href="basvuru.html">Yeni Başvuru</a>
    </div>
  </div>
</div>
</body>
</html>
