<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4XD6PKE0RD"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-4XD6PKE0RD');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Ürün Detayı</title>
  <meta name="robots" content="index, follow" />
  <style>
    :root{--bg:#f4f7fb;--surface:#fff;--text:#172033;--muted:#637083;--navy:#071326;--blue:#0b5db8;--gold:#f6a400;--line:rgba(15,35,65,.12);--shadow:0 14px 34px rgba(9,31,66,.09);--max:1180px}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}.container{width:min(var(--max),calc(100% - 28px));margin:0 auto}a{text-decoration:none;color:inherit}
    .topbar{background:#fff;border-bottom:1px solid var(--line);box-shadow:0 10px 28px rgba(12,35,64,.06)}.topbar-inner{min-height:78px;display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}.brand-mark{width:48px;height:48px;border-radius:15px;background:#f6a400;color:#071326;font-weight:900;font-size:24px;display:grid;place-items:center}.brand strong{font-size:28px;color:#0b1930}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{padding:9px 11px;border-radius:11px;background:#f7faff;border:1px solid rgba(15,35,65,.08);font-weight:800}
    .detail{padding:28px 0}.card{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:0}.photo{min-height:480px;background:#0b1930;display:grid;place-items:center;color:#ffd166;font-size:70px}.photo img{width:100%;height:100%;object-fit:cover}.info{padding:30px}.kicker{color:#a46b00;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}h1{margin:0 0 12px;color:#0b1930;font-size:clamp(30px,3.4vw,48px);line-height:1.08;letter-spacing:-.035em}.desc{color:#526174;font-size:17px;margin:0 0 18px}.meta{display:grid;gap:10px;margin:18px 0}.row{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding:11px 0;color:#637083}.row strong{color:#0b1930;text-align:right}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{min-height:46px;padding:0 16px;border-radius:12px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent}.btn-primary{background:#0b5db8;color:#fff}.btn-gold{background:#f6a400;color:#071326}.btn-secondary{background:#fff;color:#132238;border-color:var(--line)}.notice{margin-top:20px;background:#fff4d8;color:#5f4300;border:1px solid rgba(246,164,0,.30);border-radius:18px;padding:16px}.empty{padding:30px;background:#fff;border:1px solid var(--line);border-radius:22px;color:#637083}
    @media(max-width:900px){.card{grid-template-columns:1fr}.photo{min-height:300px}}
  </style>
</head>
<body>
<header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html"><div class="brand-mark">S</div><strong>SEVRA</strong></a><nav class="nav"><a href="urun-vitrini.html">Ürün Kataloğu</a><a href="firma-katalog.html">Firma Kataloğu</a><a href="index.html">Ana Sayfa</a></nav></div></header>
<main class="container detail" id="root"><div class="empty">Ürün detayı yükleniyor...</div></main>
<script type="module">
  import { db } from './firebase-config.js';
  import { doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const root=document.getElementById('root'); const id=new URLSearchParams(location.search).get('id');
  function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");}
  function wa(p){const w=String(p.whatsapp||'').replace(/\D/g,'');return w?`https://wa.me/${w}`:'index.html#iletisim'}
  async function findCompanyBySeller(seller){
    try{
      const q = query(collection(db, 'companies'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id:d.id, ...d.data() }))
        .find(c => c.status === 'approved' && c.isTest !== true && c.isTest !== true && String(c.companyName||'').trim().toLowerCase() === String(seller||'').trim().toLowerCase());
    }catch(e){
      return null;
    }
  }
  async function load(){
    if(!id || id.startsWith('test')){root.innerHTML='<div class="empty">Bu kayıt test amaçlıdır. Gerçek ürün detayı için ürün yönetimi ekranından ürün ekleyin.</div>';return;}
    try{
      const snap=await getDoc(doc(db,'products',id));
      if(!snap.exists()){root.innerHTML='<div class="empty">Ürün bulunamadı.</div>';return;}
      const p={id:snap.id,...snap.data()};
      const company = await findCompanyBySeller(p.seller);
      document.title='SEVRA | '+(p.name||'Ürün Detayı');
      root.innerHTML=`<div class="card"><div class="photo">${p.imageData?`<img src="${p.imageData}" alt="${esc(p.name)}">`:'📦'}</div><div class="info"><div class="kicker">${esc(p.category||'Ürün')}</div><h1>${esc(p.name||'Ürün')}</h1><p class="desc">${esc(p.description||'')}</p><div class="meta"><div class="row"><span>İlan sahibi</span><strong>${company ? `<a href="firma-detay.html?id=${encodeURIComponent(company.id)}">${esc(p.seller||'-')}</a>` : esc(p.seller||'-')}</strong></div><div class="row"><span>Konum</span><strong>${esc(p.location||'-')}</strong></div><div class="row"><span>Telefon</span><strong>${esc(p.phone||'-')}</strong></div><div class="row"><span>Durum</span><strong>${esc(p.status||'active')}</strong></div></div><div class="btns"><a class="btn btn-gold" href="${wa(p)}" target="_blank" rel="noopener">WhatsApp ile Bilgi Al</a>${company ? `<a class="btn btn-primary" href="firma-detay.html?id=${encodeURIComponent(company.id)}">Firma Detayı</a>` : ''}<a class="btn btn-secondary" href="urun-vitrini.html">Kataloğa Dön</a></div><div class="notice">SEVRA ürün satıcısı değildir. Ödeme, teslimat, garanti, iade ve satış sözleşmesi ilan sahibi ile alıcı arasında yürütülür.</div></div></div>`;
    }catch(err){root.innerHTML='<div class="empty">Detay okunamadı: '+esc(err.message)+'</div>'}
  }
  load();
</script>
</body>
</html>
