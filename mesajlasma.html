<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEVRA | Mesajlaşma ve Pazarlık</title>
  <link rel="stylesheet" href="kurumsal-ui.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="mesajlasma.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Mesajlaşma ve Pazarlık</span>
        </div>
      </a>
      <div class="top-actions">
        <a class="btn btn-secondary" href="ilan-teklif.html">Teklif Akışına Dön</a>
        <a class="btn btn-secondary" href="admin-dashboard.html">Dashboard'a Dön</a>
        <a class="btn btn-secondary" href="index.html">Ana Sayfaya Dön</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="hero-mini">
        <div>
          <div class="section-kicker">Kontrollü Mesajlaşma</div>
          <h1>Pazarlık ekranı</h1>
          <p>Platform içi görüşmeler bu ekran üzerinden kontrollü biçimde yürütülür. Dış iletişim paylaşımı sistem kurallarına göre sınırlandırılır.</p>
        </div>
      </section>

      <section class="content-card chat-shell">
        <div class="card-head">
          <h2>Mesaj Akışı</h2>
          <span class="pill">Koruma aktif</span>
        </div>

        <div id="chatStatus" class="status-box hidden"></div>

        <div id="chatMessages" class="chat-messages"></div>

        <form id="chatForm" class="chat-form">
          <textarea id="chatInput" placeholder="Mesajınızı yazın"></textarea>
          <button type="submit" class="btn btn-primary">Gönder</button>
        </form>
      </section>
    </div>
  </main>

  <script>
    const initialMessages = [
      { sender: 'Sistem', text: 'Teklif üzerinden pazarlık ekranı açıldı.', time: '21:15' }
    ];

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatForm = document.getElementById('chatForm');
    const chatStatus = document.getElementById('chatStatus');

    function showStatus(message, isError) {
      chatStatus.textContent = message;
      chatStatus.classList.remove('hidden', 'status-success', 'status-error');
      chatStatus.classList.add(isError ? 'status-error' : 'status-success');
    }

    function sanitizeExistingText(text) {
      return text
        .replace(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/ig, '[iletişim bilgisi gizlendi]')
        .replace(/(?:\+?90|0)?\s*5\d{2}[\s.-]?\d{3}[\s.-]?\d{2}[\s.-]?\d{2}/g, '[telefon gizlendi]')
        .replace(/wa\.me\/\d+/ig, '[whatsapp gizlendi]');
    }

    function hasForbiddenContact(text) {
      const emailRegex = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/ig;
      const phoneRegex = /(?:\+?90|0)?\s*5\d{2}[\s.-]?\d{3}[\s.-]?\d{2}[\s.-]?\d{2}/g;
      const whatsappRegex = /(whatsapp|wa\.me|@gmail|@hotmail|@outlook|ara beni|beni ara)/ig;
      return emailRegex.test(text) || phoneRegex.test(text) || whatsappRegex.test(text);
    }

    function render(messages) {
      chatMessages.innerHTML = messages.map((item, idx) => {
        const cls = idx % 2 === 0 ? 'msg admin' : 'msg user';
        return `
          <div class="${cls}">
            <div class="msg-sender">${item.sender}</div>
            <div class="msg-text">${sanitizeExistingText(item.text)}</div>
            <div class="msg-time">${item.time}</div>
          </div>
        `;
      }).join('');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    let messages = initialMessages.slice();
    render(messages);

    chatForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const value = chatInput.value.trim();
      if (!value) return;

      if (hasForbiddenContact(value)) {
        showStatus('Telefon, e-posta, WhatsApp numarası veya dış iletişim bilgisi tespit edildi. Mesaj gönderilmedi.', true);
        chatInput.value = '';
        return;
      }

      messages.push({
        sender: 'Üye',
        text: value,
        time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })
      });

      render(messages);
      chatInput.value = '';
      showStatus('Mesaj gönderildi.', false);
    });
  </script>
</body>
</html>
