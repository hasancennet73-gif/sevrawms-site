<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Ürün Yönetimi</title>
  <link rel="stylesheet" href="urunler.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Dijital Lojistik ve Tedarik Platformu</span>
        </div>
      </a>
      <div class="top-actions">
        <a class="btn btn-secondary" href="yonetici-panel.html">Panele Dön</a>
      </div>
    </div>
  </header>

  <section class="page">
    <div class="container">
      <div class="page-head">
        <div>
          <div class="section-kicker">Ürün Yönetimi</div>
          <h1>Ürün ekleme ve vitrin yönetimi</h1>
          <p>Yönetici buradan ürün ekler. Eklenen ürünler vitrin ekranında görünür.</p>
        </div>
      </div>

      <div id="statusBox" class="status-box hidden"></div>

      <div class="grid">
        <section class="card">
          <div class="section-kicker">Yeni Ürün</div>
          <h2>Ürün bilgilerini gir</h2>

          <form id="productForm" class="form-grid">
            <div class="form-group">
              <label for="productName">Ürün Adı</label>
              <input id="productName" type="text" placeholder="Örn: Kapı Menteşesi" required />
            </div>

            <div class="form-group">
              <label for="productCategory">Kategori</label>
              <input id="productCategory" type="text" placeholder="Örn: Yedek Parça" required />
            </div>

            <div class="form-group">
              <label for="productPrice">Fiyat</label>
              <input id="productPrice" type="text" placeholder="Örn: 2.450 TL" required />
            </div>

            <div class="form-group">
              <label for="productImage">Görsel URL</label>
              <input id="productImage" type="text" placeholder="https://..." required />
            </div>

            <div class="form-group full">
              <label for="productDesc">Açıklama</label>
              <textarea id="productDesc" rows="5" placeholder="Ürün açıklaması"></textarea>
            </div>

            <div class="form-actions full">
              <button type="submit" class="btn btn-primary">Ürün Ekle</button>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="section-kicker">Kayıtlı Ürünler</div>
          <h2>Ürün listesi</h2>
          <table>
            <thead>
              <tr>
                <th>Ad</th>
                <th>Kategori</th>
                <th>Fiyat</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="productsTbody"></tbody>
          </table>
        </section>
      </div>
    </div>
  </section>

  <script>
    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    const session = readJson('sevra_admin_session', null);
    if (!session) {
      window.location.href = 'yonetici-giris.html';
    }

    const form = document.getElementById('productForm');
    const tbody = document.getElementById('productsTbody');
    const statusBox = document.getElementById('statusBox');

    function showStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.classList.remove('hidden', 'status-error', 'status-success');
      statusBox.classList.add(isError ? 'status-error' : 'status-success');
    }

    function getProducts() {
      const products = readJson('sevra_products', []);
      return Array.isArray(products) ? products : [];
    }

    function setProducts(products) {
      writeJson('sevra_products', products);
    }

    function renderProducts() {
      const products = getProducts();
      tbody.innerHTML = '';

      if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="4">Ürün yok.</td></tr>';
        return;
      }

      products.forEach(product => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price}</td>
          <td><button class="mini-btn" type="button" data-id="${product.id}">Sil</button></td>
        `;
        tr.querySelector('button').addEventListener('click', () => {
          const next = getProducts().filter(x => x.id !== product.id);
          setProducts(next);
          renderProducts();
          showStatus('Ürün silindi.');
        });
        tbody.appendChild(tr);
      });
    }

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const product = {
        id: 'PRD-' + Date.now(),
        name: document.getElementById('productName').value.trim(),
        category: document.getElementById('productCategory').value.trim(),
        price: document.getElementById('productPrice').value.trim(),
        image: document.getElementById('productImage').value.trim(),
        desc: document.getElementById('productDesc').value.trim()
      };

      if (!product.name || !product.category || !product.price || !product.image) {
        showStatus('Zorunlu alanları doldur.', true);
        return;
      }

      const products = getProducts();
      products.push(product);
      setProducts(products);
      form.reset();
      renderProducts();
      showStatus('Ürün eklendi. Vitrinde görünecek.');
    });

    renderProducts();
  </script>
</body>
</html>
