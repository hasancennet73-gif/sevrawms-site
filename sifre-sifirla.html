<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Yeni Şifre Belirle</title>
  <link rel="stylesheet" href="uye-auth.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Yeni Şifre Belirle</span>
        </div>
      </a>
      <div class="actions">
        <a class="btn" href="uye-login.html">Üye Girişi</a>
      </div>
    </header>

    <main class="stack">
      <section class="panel">
        <div class="kicker">Şifre Sıfırlama</div>
        <h1>Yeni şifre oluştur</h1>
        <p>Geçerli sıfırlama bağlantısı ile yeni şifrenizi belirleyin.</p>

        <form id="resetForm" class="form-grid" autocomplete="off">
          <div class="field full">
            <label for="newPassword">Yeni Şifre</label>
            <input id="newPassword" name="newPassword" type="password" placeholder="Yeni şifre" autocomplete="new-password" />
          </div>
          <div class="field full">
            <label for="newPassword2">Yeni Şifre Tekrar</label>
            <input id="newPassword2" name="newPassword2" type="password" placeholder="Yeni şifre tekrar" autocomplete="new-password" />
          </div>
          <div class="actions-row full">
            <button id="resetBtn" type="submit" class="btn primary">Şifreyi Güncelle</button>
            <a class="btn" href="uye-login.html">Üye Girişine Dön</a>
          </div>
        </form>

        <div id="resetMsg" class="note hidden"></div>
      </section>
    </main>
  </div>

<script>
const SUPABASE_URL = 'https://yyiphivbdsjsuxyaihnf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SCFO1g9veclYKqCI3pw7Eg_dE1bhyLR';

function show(el, text, ok){
  el.className = 'note ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}

function setBusy(isBusy){
  const btn = document.getElementById('resetBtn');
  btn.disabled = isBusy;
  btn.textContent = isBusy ? 'Güncelleniyor...' : 'Şifreyi Güncelle';
}

const params = new URLSearchParams(location.search);
const token = params.get('token') || '';

async function supabaseFindReset(tokenValue){
  const url =
    SUPABASE_URL +
    '/rest/v1/password_resets?token=eq.' +
    encodeURIComponent(tokenValue) +
    '&used=eq.false&select=id,email,token,used';

  const response = await fetch(url, {
    method: 'GET',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json'
    }
  });

  if (!response.ok) {
    const text = await response.text();
    throw new Error('Reset kaydı okunamadı: ' + text);
  }

  const data = await response.json();
  return Array.isArray(data) ? data[0] : null;
}

async function supabaseUpdateMemberPassword(email, newPassword){
  const url =
    SUPABASE_URL +
    '/rest/v1/members?email=eq.' +
    encodeURIComponent(email);

  const response = await fetch(url, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      password: newPassword,
      updated_at: new Date().toISOString()
    })
  });

  if (!response.ok) {
    const text = await response.text();
    throw new Error('Üye şifresi güncellenemedi: ' + text);
  }

  return await response.json();
}

async function supabaseMarkResetUsed(resetId){
  const url =
    SUPABASE_URL +
    '/rest/v1/password_resets?id=eq.' +
    encodeURIComponent(resetId);

  const response = await fetch(url, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      used: true,
      used_at: new Date().toISOString()
    })
  });

  if (!response.ok) {
    const text = await response.text();
    throw new Error('Reset kaydı kapatılamadı: ' + text);
  }

  return await response.json();
}

document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const p1 = document.getElementById('newPassword').value.trim();
  const p2 = document.getElementById('newPassword2').value.trim();
  const msg = document.getElementById('resetMsg');

  if(!token){
    show(msg, 'Şifre sıfırlama bağlantısı geçersiz.', false);
    return;
  }

  if(!p1 || !p2){
    show(msg, 'Lütfen tüm alanları doldur.', false);
    return;
  }

  if(p1 !== p2){
    show(msg, 'Şifreler eşleşmiyor.', false);
    return;
  }

  setBusy(true);

  try {
    const resetRow = await supabaseFindReset(token);

    if(!resetRow){
      show(msg, 'Geçerli bir sıfırlama kaydı bulunamadı.', false);
      setBusy(false);
      return;
    }

    await supabaseUpdateMemberPassword(resetRow.email, p1);
    await supabaseMarkResetUsed(resetRow.id);

    show(msg, 'Şifreniz güncellendi. Artık yeni şifrenizle giriş yapabilirsiniz.', true);
  } catch (err) {
    show(msg, 'İşlem başarısız: ' + err.message, false);
    setBusy(false);
  }
});
</script>
</body>
</html>
