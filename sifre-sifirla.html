<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şifre Sıfırla</title>
</head>
<body>

<h2>Yeni Şifre</h2>
<input id="p1" placeholder="yeni şifre"><br>
<input id="p2" placeholder="tekrar"><br>
<button onclick="save()">Kaydet</button>

<p id="msg"></p>

<script>
function readJson(key){return JSON.parse(localStorage.getItem(key)||"[]")}
function writeJson(key,val){localStorage.setItem(key,JSON.stringify(val))}

const token=new URLSearchParams(location.search).get("token");

function save(){
 const p1=document.getElementById('p1').value;
 const p2=document.getElementById('p2').value;

 if(p1!==p2){
  msg.innerText="eşleşmiyor";
  return;
 }

 const members=readJson('sevra_members');
 const row=members.find(x=>x.resetToken===token);

 if(!row){
  msg.innerText="token hatalı";
  return;
 }

 row.password=p1;
 delete row.resetToken;
 writeJson('sevra_members',members);

 msg.innerText="şifre değişti";
}
</script>

</body>
</html>
