<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEVRA | Üyelik ve Giriş</title>
  <link rel="stylesheet" href="kurumsal-ui.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Üyelik ve Giriş</span>
        </div>
      </a>
      <a class="btn btn-secondary" href="index.html">Siteye Dön</a>
    </div>
  </header>

  <section class="entry-shell-wrap">
    <div class="container">
      <div class="dual-shell">
        <div class="entry-card">
          <div class="section-kicker">Üye Girişi</div>
          <h2>Mevcut hesapla giriş yap</h2>
          <form class="entry-form">
            <label>Kullanıcı Adı<input placeholder="Kullanıcı adı"></label>
            <label>Şifre<input placeholder="Şifre" type="password"></label>
            <a class="btn btn-primary btn-block" href="uye-panel.html">Giriş Yap</a>
          </form>
        </div>

        <div class="entry-card">
          <div class="section-kicker">Yeni Üyelik</div>
          <h2>Kurumsal kayıt oluştur</h2>
          <form class="entry-form two">
            <label>Firma Adı<input placeholder="Firma adı"></label>
            <label>Yetkili Kişi<input placeholder="Yetkili kişi"></label>
            <label>Telefon<input placeholder="Telefon"></label>
            <label>Rol
              <select>
                <option>Taşıyıcı</option>
                <option>Yük Veren</option>
                <option>Tedarikçi</option>
              </select>
            </label>
            <div class="full">
              <a class="btn btn-primary btn-block" href="#">Kayıt Oluştur</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
