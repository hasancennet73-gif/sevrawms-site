<!-- sadece script kısmı değiştirildi -->
<script>
function readJson(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}
function writeJson(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}
function createToken(){
  return 'SEVRA-' + Math.random().toString(36).slice(2,10) + '-' + Date.now();
}

document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();

  const email=document.getElementById('email').value.trim().toLowerCase();
  const members=Array.isArray(readJson('sevra_members', [])) ? readJson('sevra_members', []) : [];

  const token = createToken();
  const member = {
    email,
    activationLink: 'uye-onay.html?token=' + encodeURIComponent(token)
  };

  members.push(member);
  writeJson('sevra_members', members);

  fetch('/api/send-mail', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: email,
      link: 'https://sevrawms.com.tr/' + member.activationLink,
      type: 'register'
    })
  });

  window.location.href = 'uye-mail-bekleniyor.html';
});
</script>
