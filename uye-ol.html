<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Kurumsal Üyelik Başvurusu</title>
  <link rel="stylesheet" href="uye-auth.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Kurumsal Üyelik Başvurusu</span>
        </div>
      </a>
      <div class="actions">
        <a class="btn" href="uye-login.html">Üye Girişi</a>
        <a class="btn" href="index.html">Ana Sayfa</a>
      </div>
    </header>

    <main class="stack">
      <section class="panel">
        <div class="kicker">Kurumsal Kayıt</div>
        <h1>Yeni üyelik oluştur</h1>
        <p>Kurumsal kullanıcılar aşağıdaki bilgilerle başvuru oluşturur. Kayıt sonrası onay akışı başlatılır ve üyelik aktivasyon sürecine alınır.</p>

        <form id="registerForm" class="form-grid">
          <div class="field">
            <label>Firma Adı</label>
            <input id="companyName" type="text" placeholder="Firma adı" />
          </div>
          <div class="field">
            <label>Yetkili Kişi</label>
            <input id="contactName" type="text" placeholder="Yetkili kişi" />
          </div>
          <div class="field">
            <label>E-Posta</label>
            <input id="email" type="email" placeholder="ornek@firma.com" />
          </div>
          <div class="field">
            <label>Telefon</label>
            <input id="phone" type="text" placeholder="Telefon" />
          </div>
          <div class="field">
            <label>Rol</label>
            <select id="role">
              <option>Taşıyıcı</option>
              <option>Yük Veren</option>
              <option>Tedarikçi</option>
            </select>
          </div>
          <div class="field">
            <label>Şifre</label>
            <input id="password" type="password" placeholder="Şifre" />
          </div>
          <div class="actions-row full">
            <button type="submit" class="btn primary">Başvuru Oluştur</button>
            <a class="btn" href="uye-login.html">Giriş Ekranına Dön</a>
          </div>
        </form>

        <div id="registerMsg" class="note hidden"></div>
      </section>
    </main>
  </div>

<script>
function readJson(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}
function writeJson(key, value){
  localStorage.setItem(key, JSON.stringify(value));
}
function show(el, text, ok){
  el.className = 'note ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}
function createToken(){
  return 'SEVRA-' + Math.random().toString(36).slice(2,10) + '-' + Date.now();
}

document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();

  const companyName=document.getElementById('companyName').value.trim();
  const contactName=document.getElementById('contactName').value.trim();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const phone=document.getElementById('phone').value.trim();
  const role=document.getElementById('role').value;
  const password=document.getElementById('password').value.trim();
  const msg=document.getElementById('registerMsg');

  if(!companyName || !contactName || !email || !phone || !password){
    show(msg, 'Lütfen tüm alanları doldur.', false);
    return;
  }

  const members=Array.isArray(readJson('sevra_members', [])) ? readJson('sevra_members', []) : [];
  if(members.some(x => x.email === email)){
    show(msg, 'Bu e-posta ile daha önce kayıt oluşturulmuş.', false);
    return;
  }

  const token = createToken();
  const member = {
    companyName,
    contactName,
    email,
    phone,
    role,
    password,
    status: 'Mail Onayı Bekliyor',
    activationToken: token,
    activationLink: 'uye-onay.html?token=' + encodeURIComponent(token),
    createdAt: new Date().toISOString()
  };

  members.push(member);
  writeJson('sevra_members', members);

  const apps=Array.isArray(readJson('sevra_applications', [])) ? readJson('sevra_applications', []) : [];
  apps.push({
    id: 'APP-' + Date.now(),
    companyName,
    contactName,
    email,
    phone,
    role,
    password,
    status: 'Mail Onayı Bekliyor',
    activationToken: token,
    activationLink: member.activationLink
  });
  writeJson('sevra_applications', apps);

  sessionStorage.setItem('sevra_last_register_email', email);
  window.location.href = 'uye-mail-bekleniyor.html';
});
</script>
</body>
</html>
