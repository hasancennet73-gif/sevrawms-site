<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Kayit Secimi</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--line:rgba(255,255,255,.08);--text:#eef4ff;--muted:#aebcd3;--yellow:#f1c84d;}
    body{font-family:Arial,Helvetica,sans-serif;color:var(--text);background:radial-gradient(circle at top right, rgba(241,200,77,.08), transparent 18%),radial-gradient(circle at left top, rgba(44,89,179,.16), transparent 24%),linear-gradient(180deg,#071425,#08111b 74%,#040912);}
    a{text-decoration:none;color:inherit}
    .wrap{max-width:1200px;margin:0 auto;padding:26px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .title h1{font-size:36px;margin-bottom:8px}
    .title p{color:var(--muted)}
    .btn{min-height:42px;padding:0 14px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;text-decoration:none}
    .btn.primary{background:var(--yellow);color:#0b1830;border-color:transparent}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(241,200,77,.14);color:#ffe08a;font-size:12px;font-weight:700}
    .card,.panel,.note{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.03);padding:18px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    .card strong{display:block;font-size:28px;margin-bottom:6px}
    .card span{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    label{font-size:13px;color:#dce6f5;font-weight:700}
    input,select,textarea{width:100%;background:#091425;border:1px solid rgba(255,255,255,.10);color:#fff;border-radius:12px;padding:12px;font-size:15px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
    .status{display:inline-flex;min-height:28px;padding:0 10px;border-radius:999px;align-items:center;font-size:12px;font-weight:700;background:rgba(241,200,77,.14);color:#ffe08a}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    @media (max-width:900px){.grid,.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="wrap">
  <div class="title" style="margin-bottom:18px"><h1>Kayit Secimi</h1><p>Rolunu sec, sonra kayit ol veya giris yap.</p></div>
  <div class="grid">
    <div class="panel">
      <h2>Nakliyeci</h2>
      <div class="actions">
        <a id="carrierReg" class="btn primary" href="uye-ol.html?role=carrier">Kayit Ol</a>
        <a id="carrierLog" class="btn" href="uye-login.html?role=carrier">Giris Yap</a>
      </div>
    </div>
    <div class="panel">
      <h2>Yuk Veren</h2>
      <div class="actions">
        <a id="shipperReg" class="btn primary" href="uye-ol.html?role=shipper">Kayit Ol</a>
        <a id="shipperLog" class="btn" href="uye-login.html?role=shipper">Giris Yap</a>
      </div>
    </div>
    <div class="panel">
      <h2>Standart Uye</h2>
      <div class="actions">
        <a id="memberReg" class="btn primary" href="uye-ol.html?role=member">Kayit Ol</a>
        <a id="memberLog" class="btn" href="uye-login.html?role=member">Giris Yap</a>
      </div>
    </div>
  </div>
</div>

<script src="kimlik-dogrulama.js"></script>

<script>
function q(n){return new URLSearchParams(location.search).get(n)||'';}
function build(base,role){
  var p=['role='+encodeURIComponent(role)];
  if(q('redirect')) p.push('redirect='+encodeURIComponent(q('redirect')));
  if(q('load_id')) p.push('load_id='+encodeURIComponent(q('load_id')));
  return base+'?'+p.join('&');
}
document.getElementById('carrierReg').href=build('uye-ol.html','carrier');
document.getElementById('carrierLog').href=build('uye-login.html','carrier');
document.getElementById('shipperReg').href=build('uye-ol.html','shipper');
document.getElementById('shipperLog').href=build('uye-login.html','shipper');
document.getElementById('memberReg').href=build('uye-ol.html','member');
document.getElementById('memberLog').href=build('uye-login.html','member');
</script>

</body>
</html>
