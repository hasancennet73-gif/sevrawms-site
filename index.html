<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | V17 Kurumsal Nakliye Platformu</title>
  <meta name="description" content="SEVRA V17; sarı-lacivert kurumsal kimliği, güçlü ana vitrin yapısı ve lojistik odaklı dijital platform hissiyle yük veren ve taşıyıcıları bir araya getiren yeni nesil operasyon yüzüdür." />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#071427;
      --bg2:#0b1f3d;
      --panel:#0d2243;
      --panel2:#132c58;
      --line:rgba(255,255,255,.10);
      --text:#eef4ff;
      --muted:#aebbd1;
      --yellow:#f3c744;
      --yellow-dark:#d9a91f;
      --blue:#17325f;
      --blue2:#102446;
      --card:rgba(10,24,49,.88);
      --shadow:0 22px 60px rgba(0,0,0,.35);
      --radius:24px;
      --max:1320px;
    }

    html{scroll-behavior:smooth}
    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(243,199,68,.08), transparent 18%),
        radial-gradient(circle at left top, rgba(36,78,154,.18), transparent 24%),
        linear-gradient(180deg,#071427,#08111d 70%, #050b14);
      line-height:1.6;
    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{max-width:var(--max);margin:0 auto;padding:0 22px}

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      border-bottom:1px solid var(--line);
      background:rgba(4,12,24,.88);
      backdrop-filter:blur(14px);
    }

    .topbar-inner{
      min-height:86px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:220px;
    }

    .brand-mark{
      width:54px;
      height:54px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--yellow),#f7df92);
      color:#0f1d38;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:24px;
      box-shadow:0 12px 30px rgba(243,199,68,.28);
    }

    .brand-text strong{
      display:block;
      font-size:30px;
      letter-spacing:.4px;
    }

    .brand-text span{
      display:block;
      font-size:12px;
      color:#d6e0ef;
      letter-spacing:.8px;
    }

    .nav{
      display:flex;
      gap:28px;
      font-size:15px;
      color:#d2dcef;
    }

    .nav a:hover{color:#fff}

    .actions{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .btn{
      min-height:48px;
      padding:0 22px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      border:1px solid transparent;
      transition:.2s ease;
      cursor:pointer;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:var(--yellow);
      color:#0b1830;
      box-shadow:0 14px 30px rgba(243,199,68,.18);
    }
    .btn-primary:hover{background:var(--yellow-dark)}
    .btn-secondary{
      background:rgba(255,255,255,.04);
      border-color:var(--line);
      color:#fff;
    }
    .btn-secondary:hover{background:rgba(255,255,255,.08)}

    .hero{padding:34px 0 34px}

    .hero-shell{
      border:1px solid var(--line);
      border-radius:34px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:
        linear-gradient(90deg, rgba(6,19,39,.93) 0%, rgba(6,19,39,.88) 40%, rgba(6,19,39,.40) 68%),
        url("https://images.unsplash.com/photo-1494412519320-aa613dfb7738?auto=format&fit=crop&w=1800&q=80") center/cover
