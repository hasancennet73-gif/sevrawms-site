
<!doctype html>
<html>
<head><meta charset="UTF-8"><title>SEVRA</title></head>
<body>

<h2>Üyelik</h2>
<input id="email" placeholder="mail">
<input id="password" placeholder="şifre">
<button onclick="register()">Kayıt Ol</button>

<h2>Login</h2>
<input id="lemail" placeholder="mail">
<input id="lpassword" placeholder="şifre">
<button onclick="login()">Giriş</button>

<h2>Şifre Sıfırla</h2>
<input id="remail" placeholder="mail">
<button onclick="reset()">Mail Gönder</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabase = supabase.createClient("https://yyiphivbdsjsuxyaihnf.supabase.co", "sb_publishable_SCFO1g9veclYKqCI3pw7Eg_dE1bhyLR");

async function register(){
 const email=document.getElementById('email').value;
 const password=document.getElementById('password').value;

 const { error } = await supabase.auth.signUp({ email, password });
 document.getElementById('msg').innerText = error ? error.message : "Mail gönderildi!";
}

async function login(){
 const email=document.getElementById('lemail').value;
 const password=document.getElementById('lpassword').value;

 const { error } = await supabase.auth.signInWithPassword({ email, password });
 document.getElementById('msg').innerText = error ? error.message : "Giriş başarılı!";
}

async function reset(){
 const email=document.getElementById('remail').value;

 const { error } = await supabase.auth.resetPasswordForEmail(email, {
   redirectTo: window.location.origin + "/reset.html"
 });

 document.getElementById('msg').innerText = error ? error.message : "Reset mail gönderildi!";
}
</script>

</body>
</html>
