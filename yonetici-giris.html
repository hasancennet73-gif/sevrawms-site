<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEVRA | Yönetim Paneli Girişi</title>
  <link rel="stylesheet" href="kurumsal-ui.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Yönetim Paneli Girişi</span>
        </div>
      </a>
      <a class="btn btn-secondary" href="index.html">Siteye Dön</a>
    </div>
  </header>

  <section class="entry-shell-wrap">
    <div class="container">
      <div class="entry-shell">
        <div class="entry-info">
          <div class="section-kicker">Yetkili Erişim</div>
          <h1>Kurumsal yönetim paneli girişi</h1>
          <p>Başvuru, teklif, pazarlık ve ürün süreçleri tek merkezli yönetim paneli üzerinden takip edilir.</p>
        </div>
        <div class="entry-card">
          <div class="section-kicker">Giriş</div>
          <h2>Yönetim paneline gir</h2>
          <form class="entry-form">
            <label>Kullanıcı Adı<input placeholder="admin"></label>
            <label>Şifre<input placeholder="123456" type="password"></label>
            <a class="btn btn-primary btn-block" href="admin-dashboard.html">Yönetim Paneline Gir</a>
          </form>
          <div class="credential-box">
            <span>Test erişim bilgisi</span>
            <strong>Kullanıcı adı: admin</strong>
            <strong>Şifre: 123456</strong>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
