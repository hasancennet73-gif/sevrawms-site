<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEVRA | Başvuru Yönetimi</title>
  <link rel="stylesheet" href="basvuru-yonetim.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SEVRA</strong>
          <span>Dijital Lojistik ve Tedarik Platformu</span>
        </div>
      </a>

      <div class="top-actions">
        <a class="btn btn-secondary" href="yonetici-panel.html">Panele Dön</a>
      </div>
    </div>
  </header>

  <section class="page-shell">
    <div class="container">
      <div class="page-head">
        <div>
          <div class="section-kicker">Başvuru ve Onay</div>
          <h1>Üye başvurularını yönet</h1>
          <p>Yeni kayıtlar burada incelenir, onaylanır veya reddedilir.</p>
        </div>
        <div class="head-actions">
          <button id="seedDemoBtn" class="btn btn-secondary" type="button">Demo Başvuru Yükle</button>
        </div>
      </div>

      <div id="statusBox" class="status-box hidden"></div>

      <div class="summary-grid">
        <article class="summary-card">
          <span>Toplam Başvuru</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="summary-card">
          <span>Bekleyen</span>
          <strong id="pendingCount">0</strong>
        </article>
        <article class="summary-card">
          <span>Onaylı</span>
          <strong id="approvedCount">0</strong>
        </article>
        <article class="summary-card">
          <span>Reddedilen</span>
          <strong id="rejectedCount">0</strong>
        </article>
      </div>

      <section class="table-card">
        <div class="card-head">
          <h2>Başvuru Listesi</h2>
        </div>
        <table>
          <thead>
            <tr>
              <th>Firma</th>
              <th>Yetkili</th>
              <th>Rol</th>
              <th>Telefon</th>
              <th>Kullanıcı</th>
              <th>Durum</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="applicationsTbody"></tbody>
        </table>
      </section>
    </div>
  </section>

  <script>
    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    const session = readJson('sevra_admin_session', null);
    if (!session) {
      window.location.href = 'yonetici-giris.html';
    }

    const tbody = document.getElementById('applicationsTbody');
    const statusBox = document.getElementById('statusBox');

    function showStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.classList.remove('hidden', 'status-error', 'status-success');
      statusBox.classList.add(isError ? 'status-error' : 'status-success');
    }

    function getApplications() {
      const apps = readJson('sevra_applications', []);
      return Array.isArray(apps) ? apps : [];
    }

    function setApplications(apps) {
      writeJson('sevra_applications', apps);
    }

    function getUsers() {
      const users = readJson('sevra_users', []);
      return Array.isArray(users) ? users : [];
    }

    function setUsers(users) {
      writeJson('sevra_users', users);
    }

    function refreshSummary(apps) {
      document.getElementById('totalCount').textContent = apps.length;
      document.getElementById('pendingCount').textContent = apps.filter(x => x.status === 'Beklemede').length;
      document.getElementById('approvedCount').textContent = apps.filter(x => x.status === 'Onaylandı').length;
      document.getElementById('rejectedCount').textContent = apps.filter(x => x.status === 'Reddedildi').length;
    }

    function approveApplication(id) {
      const apps = getApplications();
      const users = getUsers();
      const app = apps.find(x => x.id === id);

      if (!app) {
        showStatus('Başvuru bulunamadı.', true);
        return;
      }

      app.status = 'Onaylandı';

      const exists = users.some(x => x.username === app.username);
      if (!exists) {
        users.push({
          id: 'USR-' + Date.now(),
          companyName: app.companyName,
          contactName: app.contactName,
          phone: app.phone,
          role: app.role,
          username: app.username,
          password: app.password
        });
      }

      setUsers(users);
      setApplications(apps);
      renderApplications();
      showStatus('Başvuru onaylandı ve üyelere aktarıldı.');
    }

    function rejectApplication(id) {
      const apps = getApplications();
      const app = apps.find(x => x.id === id);

      if (!app) {
        showStatus('Başvuru bulunamadı.', true);
        return;
      }

      app.status = 'Reddedildi';
      setApplications(apps);
      renderApplications();
      showStatus('Başvuru reddedildi.');
    }

    function renderApplications() {
      const apps = getApplications();
      refreshSummary(apps);
      tbody.innerHTML = '';

      if (!apps.length) {
        tbody.innerHTML = '<tr><td colspan="7">Başvuru yok.</td></tr>';
        return;
      }

      apps.forEach(app => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${app.companyName || '-'}</td>
          <td>${app.contactName || '-'}</td>
          <td>${app.role || '-'}</td>
          <td>${app.phone || '-'}</td>
          <td>${app.username || '-'}</td>
          <td>${app.status || 'Beklemede'}</td>
          <td class="actions-cell">
            <button class="mini-btn approve-btn" type="button" data-id="${app.id}">Onayla</button>
            <button class="mini-btn reject-btn" type="button" data-id="${app.id}">Reddet</button>
          </td>
        `;
        tr.querySelector('.approve-btn').addEventListener('click', () => approveApplication(app.id));
        tr.querySelector('.reject-btn').addEventListener('click', () => rejectApplication(app.id));
        tbody.appendChild(tr);
      });
    }

    document.getElementById('seedDemoBtn').addEventListener('click', function() {
      const demoApps = [
        {
          id: 'APP-1001',
          companyName: 'Marmara Lojistik',
          contactName: 'Ahmet Kaya',
          phone: '0555 111 22 33',
          role: 'Taşıyıcı',
          username: 'marmaralojistik',
          password: '123456',
          status: 'Beklemede'
        },
        {
          id: 'APP-1002',
          companyName: 'Anadolu Tedarik',
          contactName: 'Mehmet Demir',
          phone: '0555 444 55 66',
          role: 'Tedarikçi',
          username: 'anadolutedarik',
          password: '123456',
          status: 'Beklemede'
        }
      ];
      setApplications(demoApps);
      renderApplications();
      showStatus('Demo başvurular yüklendi.');
    });

    renderApplications();
  </script>
</body>
</html>
